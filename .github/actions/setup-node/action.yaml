name: Setup Node
description: Setup node, including yarn

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      shell: bash
      run: |
        curl -fsSL -o ~/bin/yarn https://github.com/yarnpkg/yarn/releases/download/v1.22.17/yarn-1.22.17.js
        chmod +x ~/bin/yarn
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'yarn'
