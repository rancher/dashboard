name: Auto-Retry Failed Run

# Trigger under the same conditions as Tests workflow
on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
  workflow_dispatch: # Added to test and debug if required
    inputs:
      workflow_run_id:
        description: 'Workflow run ID to retry'
        required: true
        type: string

permissions:
  actions: write # Required to modify/rerun workflows
  contents: read
  pull-requests: write # Required to comment on the associated PR

# Retries are PR-scoped: only runs with an associated open PR are retried
# (push/scheduled runs are ignored). A `bot/auto-retry/<N>` label on the PR keeps
# retrying up to <N> times (hard capped at RETRY_CAP). Without the label, the
# default applies: a single retry on the first failure, plus a comment on the PR.
env:
  RETRY_LABEL_PREFIX: bot/auto-retry
  RETRY_CAP: 20

jobs:
  rerun-on-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to retry
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.workflow_run_id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_OWNER: ${{ github.event.workflow_run.head_repository.owner.login }}
        run: |
          # The original run is attempt 1; each retry increments run_attempt.
          ATTEMPT="${RUN_ATTEMPT:-1}"
          RETRIES_DONE=$((ATTEMPT - 1))

          # Resolve the associated OPEN PR from the run's head repository and
          # branch (`head=<owner>:<branch>`). This is the reliable identifier for
          # BOTH same-repo and fork PRs, and it is naturally empty for push and
          # scheduled runs (their branch has no open PR). We deliberately avoid
          # the run's "pull_requests" field, which for push/schedule runs is a
          # bogus constant (the repo's oldest PR), and the head-commit lookup,
          # which misses fork PRs (the commit lives in the fork, not the base).
          if [ -z "$HEAD_BRANCH" ]; then
            # Manual workflow_dispatch: read head info from the target run.
            HEAD_BRANCH=$(gh api "/repos/$REPO/actions/runs/$RUN_ID" \
              --jq '.head_branch // empty' 2>/dev/null || true)
          fi
          if [ -z "$HEAD_OWNER" ]; then
            HEAD_OWNER=$(gh api "/repos/$REPO/actions/runs/$RUN_ID" \
              --jq '.head_repository.owner.login // empty' 2>/dev/null || true)
          fi
          PR_NUMBER=""
          if [ -n "$HEAD_BRANCH" ] && [ -n "$HEAD_OWNER" ]; then
            PR_NUMBER=$(gh api "/repos/$REPO/pulls?head=$HEAD_OWNER:$HEAD_BRANCH&state=open" \
              --jq '.[0].number // empty' 2>/dev/null || true)
          fi

          # Look for a `bot/auto-retry/<N>` label and read the requested count.
          HAS_LABEL=false
          MAX_RETRIES=0
          if [ -n "$PR_NUMBER" ]; then
            LABEL_MATCH=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels \
              --jq '.labels[].name' 2>/dev/null \
              | grep -E "^${RETRY_LABEL_PREFIX}/[0-9]+$" | head -n1 || true)
            if [ -n "$LABEL_MATCH" ]; then
              HAS_LABEL=true
              REQUESTED=${LABEL_MATCH##*/}          # number after the last slash
              MAX_RETRIES=$REQUESTED
              if [ "$MAX_RETRIES" -gt "$RETRY_CAP" ]; then
                MAX_RETRIES=$RETRY_CAP               # anything above the cap runs at the cap
              fi
            fi
          fi

          SHOULD_RETRY=false
          if [ -z "$PR_NUMBER" ]; then
            # No associated open PR (e.g. push to master, scheduled run): the
            # retry feature is PR-scoped, so do nothing.
            echo "No open PR associated with this run; skipping retry."
          elif [ "$HAS_LABEL" = "true" ]; then
            # Label present: keep retrying until we reach the requested count.
            if [ "$RETRIES_DONE" -lt "$MAX_RETRIES" ]; then
              SHOULD_RETRY=true
            else
              echo "Reached the requested maximum of $MAX_RETRIES retries; not retrying again."
            fi
          else
            # Default behaviour: retry only once, on the first failure.
            if [ "$RETRIES_DONE" -lt 1 ]; then
              SHOULD_RETRY=true
            fi
          fi

          echo "attempt=$ATTEMPT" >> "$GITHUB_OUTPUT"
          echo "retries_done=$RETRIES_DONE" >> "$GITHUB_OUTPUT"
          echo "has_label=$HAS_LABEL" >> "$GITHUB_OUTPUT"
          echo "max_retries=$MAX_RETRIES" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "should_retry=$SHOULD_RETRY" >> "$GITHUB_OUTPUT"

      - name: Retry failed workflow
        if: ${{ steps.decide.outputs.should_retry == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.workflow_run_id }}
        run: |
          RUN_URL="${{ github.server_url }}/$REPO/actions/runs/$RUN_ID"
          echo "Retrying workflow run: $RUN_ID"
          echo "Run URL: $RUN_URL"
          {
            echo "### Auto-Retry Failed Run :arrows_counterclockwise:"
            echo ""
            echo "Retrying workflow run [\`$RUN_ID\`]($RUN_URL)."
            echo ""
            echo "Follow up on the run here: $RUN_URL"
          } >> "$GITHUB_STEP_SUMMARY"
          sleep 30
          gh run rerun $RUN_ID --failed --repo $REPO

      # Only comment for the default single retry. When the `bot/auto-retry/<N>`
      # label drives the retry we stay silent to avoid spamming the PR.
      - name: Comment on the associated PR
        if: ${{ steps.decide.outputs.should_retry == 'true' && steps.decide.outputs.has_label == 'false' && steps.decide.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.workflow_run_id }}
          PR_NUMBER: ${{ steps.decide.outputs.pr_number }}
        run: |
          RUN_URL="${{ github.server_url }}/$REPO/actions/runs/$RUN_ID"

          echo "Commenting on PR #$PR_NUMBER"
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(cat <<EOF
          🔄 **Auto-Retry Failed Run**

          The [Tests workflow run \`$RUN_ID\`]($RUN_URL) failed and has been automatically retried.

          Follow up on the retried run here if needed: $RUN_URL
          EOF
          )"
