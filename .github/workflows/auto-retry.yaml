name: Auto-Retry Failed Run

# Trigger under the same conditions as Tests workflow
on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
  workflow_dispatch: # Added to test and debug if required
    inputs:
      workflow_run_id:
        description: 'Workflow run ID to retry'
        required: true
        type: string

permissions:
  actions: write # Required to modify/rerun workflows
  contents: read
  pull-requests: write # Required to comment on the associated PR

jobs:
  rerun-on-failure:
    if: ${{ (github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt == 1) || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Retry failed workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.workflow_run_id }}
        run: |
          RUN_URL="${{ github.server_url }}/$REPO/actions/runs/$RUN_ID"
          echo "Retrying workflow run: $RUN_ID"
          echo "Run URL: $RUN_URL"
          {
            echo "### Auto-Retry Failed Run :arrows_counterclockwise:"
            echo ""
            echo "Retrying workflow run [\`$RUN_ID\`]($RUN_URL)."
            echo ""
            echo "Follow up on the run here: $RUN_URL"
          } >> "$GITHUB_STEP_SUMMARY"
          sleep 30
          gh run rerun $RUN_ID --failed --repo $REPO

      - name: Comment on the associated PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id || github.event.inputs.workflow_run_id }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          RUN_URL="${{ github.server_url }}/$REPO/actions/runs/$RUN_ID"

          # Resolve the PR number from the workflow_run payload, falling back to
          # the PR associated with the head commit (covers manual dispatch too).
          PR_NUMBER=$(gh api "/repos/$REPO/actions/runs/$RUN_ID" \
            --jq '.pull_requests[0].number // empty' 2>/dev/null || true)

          if [ -z "$PR_NUMBER" ] && [ -n "$HEAD_SHA" ]; then
            PR_NUMBER=$(gh api "/repos/$REPO/commits/$HEAD_SHA/pulls" \
              --jq '.[0].number // empty' 2>/dev/null || true)
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "No associated PR found for run $RUN_ID; skipping comment."
            exit 0
          fi

          echo "Commenting on PR #$PR_NUMBER"
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(cat <<EOF
          🔄 **Auto-Retry Failed Run**

          The [Tests workflow run \`$RUN_ID\`]($RUN_URL) failed and has been automatically retried.

          Follow up on the retried run here if needed: $RUN_URL
          EOF
          )"
