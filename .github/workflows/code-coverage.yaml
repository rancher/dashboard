# This workflow runs the e2e and unit tests with code coverage
# It then generates a combined report of coverage

# Runs weekly and can be run manually if required

# Coverage files are uploaded to the action as an artifact
name: Code Coverage
on:
  schedule:
    - cron: '0 1 * * 6' # 1am on Saturdays

  workflow_dispatch:

jobs:
  code-coverage:
    runs-on: ubuntu-latest
    env:
      TESTHUB_URL: ${{ secrets.TESTHUB_URL }}
      TESTHUB_TOKEN: ${{ secrets.TESTHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Setup env
        uses: ./.github/actions/setup
      - name: Run tests and collect coverage
        run: ./scripts/code-coverage
      - name: Create tar file of coverage report files
        run: tar -C coverage -cvzf coverage.tgz output
      - name: Upload code coverage folder
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: ./coverage.tgz
          if-no-files-found: error
          retention-days: 10
          compression-level: 9
      - name: Register with TestHub
        run: |
          echo "Registering test coverage run with TestHub..."
          echo "  Repository: ${{ github.repository }}"
          echo "  Run ID: ${{ github.event.workflow_run.id }}"
          echo "  Workflow: ${{ github.event.workflow_run.name }}"
          echo "  Conclusion: ${{ github.event.workflow_run.conclusion }}"

          if [ -z "${TESTHUB_URL}" ]; then
            echo "TESTHUB_URL is not set. Skipping registration."
            exit 1
          fi

          if [ -z "${TESTHUB_TOKEN}" ]; then
            echo "TESTHUB_TOKEN is not set. Skipping registration."
            exit 1
          fi          

          # Build the API URL
          API_URL="${TESTHUB_URL}/api/${{ github.repository }}/register/${{ github.event.workflow_run.id }}"
          
          # Make the API call
          curl -X POST -H "Authorization: Bearer ${TESTHUB_TOKEN}" "${API_URL}"
