name: gh-project-integration-processor

on:
  # Trigger when the PR workflow completes
  workflow_run:
    workflows: [gh-project-integration]
    types:
      - completed
jobs:
  rancher_gh_project:
    permissions:
      actions: read
      issues: write
      pull-requests: write
      repository-projects: write
      id-token: write
    if: ${{ github.repository_owner == 'rancher' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version-file: '.nvmrc'
    - name: Read secrets
      uses: rancher-eio/read-vault-secrets@7282bf97898cd1c16c89f837e0bb442e6d384c89 # v3
      with:
        secrets: |
          secret/data/github/repo/${{ github.repository }}/github/app-credentials appId | APP_ID ;
          secret/data/github/repo/${{ github.repository }}/github/app-credentials privateKey | APP_PEM
    - name: Generate Token
      id: generate-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ env.APP_ID }}
        private-key: ${{ env.APP_PEM }}
    - name: Download artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: pr-gh-project-event
        path: pr-gh-project-event/
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ github.token }}
    - name: script
      env:
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        PR_PROJECT: ${{ secrets.PR_PROJECT }}
        PR_EVENT_PATH: pr-gh-project-event/event.json
      run: node .github/workflows/scripts/pr-gh-project.js
