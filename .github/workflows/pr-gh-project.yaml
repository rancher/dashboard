name: gh-project-integration
on:
  pull_request_target:
    types: [ opened, reopened, edited, closed ]

jobs:
  rancher_gh_project:
    permissions:
      issues: write
      pull-requests: write
      repository-projects: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Use Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version-file: '.nvmrc'
    - name: Read secrets
      uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
      with:
        secrets: |
          secret/data/github/repo/${{ github.repository }}/github/app-credentials appId | APP_ID ;
          secret/data/github/repo/${{ github.repository }}/github/app-credentials privateKey | APP_PEM
    - name: Generate Token
      id: generate-token
      uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
      with:
        app-id: ${{ env.APP_ID }}
        private-key: ${{ env.APP_PEM }}
    - name: script
      env:
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        PR_PROJECT: ${{ secrets.PR_PROJECT }}
      run: node .github/workflows/scripts/pr-gh-project.js
