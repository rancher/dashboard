name: Tests
on:
  push:
    branches:
      - master
      - 'release-*'
  pull_request:
    branches:
      - master
      - 'release-*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        type: environment
        required: true

env:
  TEST_USERNAME: admin
  TEST_PASSWORD: password
  CATTLE_BOOTSTRAP_PASSWORD: password
  TEST_BASE_URL: "not set"
  API: "not set"
  # RANCHER_URL: "not set"
  # RANCHER_IP: "not set"
  # Build the dashboard to use in tests. When set to false it will grab `latest` from CDN (useful for running e2e tests quickly)
  BUILD_DASHBOARD: true

  E2E_RANCHER_LOG: rancher.log
  E2E_BUILD_DIST_NAME: dist
  E2E_BUILD_DIST_DIR: dist
  E2E_BUILD_DIST_EMBER_NAME: dist_ember
  E2E_BUILD_DIST_EMBER_DIR: dist_ember

jobs:
  e2e-build-and-run-rancher:
    if: "!contains( github.event.pull_request.labels.*.name, 'ci/skip-e2e')"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        role: [
          { username: 'admin', tag: '@adminUser' },
          { username: 'standard_user', tag: '@standardUser' }
        ]
        features:  [
          # ['@navigation', '@extensions'],
          ['@charts'],
          # ['@explorer'],
          # ['@explorer2'],
          # ['@virtualizationMgmt', '@fleet'],
          # ['@generic', '@globalSettings'],
          # ['@manager'],
          # ['@userMenu', '@usersAndAuths'],
          # ['@components'],
          # ['@noVai']
        ]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Setup env
        uses: ./.github/actions/setup

      - name: Create URLs from public ip # URLs are per job and are needed at build time
        run: |
          IP=$(curl -s ifconfig.me)
          echo "API=$IP" >> $GITHUB_ENV
          echo "TEST_BASE_URL=https://$IP.sslip.io" >> $GITHUB_ENV
          echo $TEST_BASE_URL > rancher-url.txt

      - name: Build e2e
        run: yarn e2e:build

      - name: Run Rancher
        run: yarn e2e:k3s

      - name: Setup Rancher and user
        run: |
          yarn e2e:prod
        env: 
          GREP_TAGS: ${{ matrix.role.tag }}Setup+${{ matrix.features[0] }} --@jenkins ${{ matrix.role.tag }}Setup+${{ matrix.features[1] || matrix.features[0] }} --@jenkins
          TEST_USERNAME: admin
          TEST_ONLY: setup

      - name: Upload Rancher URL # creating this artifact triggers dependent jobs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rancher-url-${{ github.run_id }}-${{ matrix.role.username }}-${{ matrix.features[0] }}
          path: rancher-url.txt
          retention-days: 1

      - name: Keep Rancher alive # this ensure rancher runs until dependent job finishes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Rancher is up. Waiting for the corresponding test job to finish."

          # Timeout after 1 hour
          end_time=$(( $(date +%s) + 3600 ))

          while [[ $(date +%s) -lt $end_time ]]; do
            # Check if the completion artifact exists
            ARTIFACT_ID=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --jq ".artifacts[] | select(.name == \"test-done-${{ github.run_id }}-${{ matrix.role.username }}-${{ matrix.features[0] }}\") | .id")
            if [[ -n "$ARTIFACT_ID" ]]; then
              echo "Test job has finished. Shutting down Rancher."

              exit 0
            fi

            echo "Test job not finished yet. Waiting..."

            # wait before next check
            sleep 30
          done

          echo "Timed out waiting for test job to finish."
          exit 1

      - name: Fetch Rancher Logs
        run: |
          yarn k3s:local:logs
          mkdir -p artifacts
          cp ${{ env.E2E_RANCHER_LOG }} artifacts/rancher.logs 2>/dev/null || :

      - name: Upload Rancher Logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{github.run_number}}-${{github.run_attempt}}-artifacts-${{ matrix.role.tag }}${{ matrix.features[0] }}${{ matrix.features[1] }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 5
          compression-level: 9

  e2e-test:
    if: "!contains( github.event.pull_request.labels.*.name, 'ci/skip-e2e')"
    strategy:
      fail-fast: false
      matrix:
        role: [
          { username: 'admin', tag: '@adminUser' },
          { username: 'standard_user', tag: '@standardUser' }
        ]
        features:  [
          # ['@navigation', '@extensions'],
          ['@charts'],
          # ['@explorer'],
          # ['@explorer2'],
          # ['@virtualizationMgmt', '@fleet'],
          # ['@generic', '@globalSettings'],
          # ['@manager'],
          # ['@userMenu', '@usersAndAuths'],
          # ['@components'],
          # ['@noVai']
        ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Setup env
        uses: ./.github/actions/setup

      - name: Wait for Rancher and get URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: |
          ARTIFACT_NAME="rancher-ip-${RUN_ID}-${{ matrix.role.username }}-${{ matrix.features[0] }}"
          echo "Looking for artifact: $ARTIFACT_NAME"
          for i in {1..60}; do
            ARTIFACT_ID=$(gh api "/repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts" --jq ".artifacts[] | select(.name == \"$ARTIFACT_NAME\") | .id")
            if [[ -n "$ARTIFACT_ID" ]]; then
              echo "Artifact found with ID: $ARTIFACT_ID"
              gh artifact download $ARTIFACT_NAME --dir .
              TEST_BASE_URL=$(cat rancher-url.txt)
              echo "TEST_BASE_URL=$TEST_BASE_URL" >> $GITHUB_ENV
              rm rancher-url.txt
              exit 0
            fi
            echo "Attempt $i: Rancher not ready yet. Waiting 10 seconds..."
            sleep 10
          done
          echo "Tired of waiting for rancher-ip artifact. Timing out."
          exit 1

      - name: Setup Rancher and user
        run: |
          yarn e2e:prod
        env: 
          GREP_TAGS: ${{ matrix.role.tag }}Setup+${{ matrix.features[0] }} --@jenkins ${{ matrix.role.tag }}Setup+${{ matrix.features[1] || matrix.features[0] }} --@jenkins
          TEST_USERNAME: admin
          TEST_ONLY: setup
          TEST_BASE_URL: ${{ env.TEST_BASE_URL }}
          API: ${{ env.TEST_BASE_URL }}

      - name: Run user tests
        run: |
          yarn e2e:prod
          [ "$BUILD_DASHBOARD" != "false" ] || exit 0
        env: 
          TEST_SKIP: setup
          GREP_TAGS: ${{ matrix.role.tag }}+${{ matrix.features[0] }} --@jenkins ${{ matrix.role.tag }}+${{ matrix.features[1] || matrix.features[0] }} --@jenkins
          TEST_USERNAME: ${{ matrix.role.username }}
          VAI_ENABLED: ${{ (matrix.features[0] != '@noVai') && 'true' || 'false' }}
          TEST_BASE_URL: ${{ env.TEST_BASE_URL }}
          API: ${{ env.TEST_BASE_URL }}

      - name: Create Artifacts Folder
        if: ${{ always() }}
        run: |
          mkdir artifacts
          cp -r cypress/screenshots artifacts 2>/dev/null || :
          cp -r cypress/videos artifacts 2>/dev/null || :
          cp -r cypress/reports/* artifacts || :
          cp browser-logs/out.html artifacts/browser-logs.html 2>/dev/null || :

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() }}
        with:
          name: ${{github.run_number}}-${{github.run_attempt}}-artifacts-${{ matrix.role.tag }}${{ matrix.features[0] }}${{ matrix.features[1] }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 5
          compression-level: 9

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      
      - name: Run tests
        uses: ./.github/actions/unit-tests

      - name: Collect Coverage
        run: |
          mkdir -p coverage-artifacts/coverage
          cp coverage/unit/coverage-final.json coverage-artifacts/coverage/coverage-unit.json
          cp -r coverage/unit/ coverage-artifacts/coverage/unit/

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{github.run_number}}-${{github.run_attempt}}-coverage
          path: coverage-artifacts/**/*

      - name: Upload unit test junit file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{github.run_number}}-${{github.run_attempt}}-unit-tests
          path: unit-test-reports/*

  i18n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Run i18n lint
        uses: ./.github/actions/i18n-lint

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Run tests
        uses: ./.github/actions/lint
      
  check-i18n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
      
      - name: Install packages
        run: yarn install:ci
      
      - name: Run i18n string check
        run: |
          # Falure won't fail the job (remove -x when all current issues are fixed)
          ./scripts/check-i18n -s -x

  check-i18n-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
      
      - name: Install packages
        run: yarn install:ci
      
      - name: Run check of all http links in the i18n files (broken link check)
        run: |
          ./scripts/check-i18n-links

  # coverage:
  #   runs-on: ubuntu-latest
  #   needs:
  #     - unit-test
  #   steps:
  #     - uses: actions/checkout@v3
  #       with:
  #         fetch-depth: 1

  #     - uses: actions/setup-node@v6
  #       with:
  #         node-version-file: '.nvmrc'

  #     - name: Download Coverage Artifacts
  #       uses: actions/download-artifact@v3
  #       with:
  #         name: ${{github.run_number}}-${{github.run_attempt}}-coverage

  #     - name: Install Codecov CLI
  #       uses : .github/workflows/scripts/install-codecov.sh
  #       with:
  #         codecov-version:
  #         codecov-version-checksum:

  #     - name: Upload tests coverage report to Codecov
  #       run: ./codecov --verbose upload-process -t ${{ secrets.CODECOV_TOKEN }} -n ${{github.run_number}}-${{github.run_attempt}}-coverage -F unit -f ./coverage/coverage-unit.json

  check-e2e-tags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
      - name: Check e2e tags
        run: |
          ./scripts/check-e2e-tests-for-tags

  check-cypress-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
      - name: Verify Cypress build
        working-directory: ./cypress
        run: |
          yarn install --frozen-lockfile
          yarn build-pkg --verify

  # Store the PR number in an artifact for use in TestHub registration since workflow_run triggered by PRs doesn't include the PR number in the head branch or commit message
  store-origin:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - name: Save PR number or Branch name
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: |
          mkdir -p ./origin

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Storing PR number ${PR_NUMBER} for TestHub registration"
            echo "pr/$PR_NUMBER" > ./origin/origin
          else
            echo "Storing branch name ${GITHUB_REF_NAME} for TestHub registration"
            echo "branch/$GITHUB_REF_NAME" > ./origin/origin
          fi

          cat ./origin/origin
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        name: Upload origin artifact
        with:
          name: origin
          path: origin/
