# Warns and closes stale issues (labels configured via STALE_TARGET_LABELS below).
# Non-agentic replacement for the gh-aw workflow; logic lives in
# scripts/weekly-stale-issue-manager.js.
name: Weekly Stale Issue Manager

run-name: Weekly Stale Issue Manager

on:
  workflow_dispatch:
  schedule:
    - cron: "37 12 * * 0" # weekly, Sunday 12:37 UTC

permissions: {}

jobs:
  stale-issue-manager:
    if: ${{ github.repository_owner == 'rancher' && vars.DISABLE_STALE_ISSUE_MANAGER != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read   # checkout
      issues: write    # label, comment, close
      id-token: write  # vault OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'

      # App token needed to read org project #57 (GITHUB_TOKEN can't); same app
      # as gh-project-integration.
      - name: Read secrets
        uses: rancher-eio/read-vault-secrets@7282bf97898cd1c16c89f837e0bb442e6d384c89 # v3
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/github/app-credentials appId | APP_ID ;
            secret/data/github/repo/${{ github.repository }}/github/app-credentials privateKey | APP_PEM

      - name: Generate Token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.APP_PEM }}

      - name: Run stale issue manager
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # The stalebot only manages issues carrying one of these labels (comma-separated).
          STALE_TARGET_LABELS: kind/enhancement
        run: node .github/workflows/scripts/weekly-stale-issue-manager.js
