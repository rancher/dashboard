---
capa:
  description: Provision new CAPA (Cluster API Provider AWS) clusters or register existing ones.
  label: CAPA
  clusterConfig:
    title: CAPI Cluster Configuration
    region:
      label: Region
      placeholder: Select a region
    network:
      title: Network configuration
      label: Network
      placeholder: Select a network
      strategy:
        label: Strategy
        managed: 
          label: Managed network
          description: CAPA will automatically create a completely new, fully configured VPC for this cluster (including Subnets and Security Groups).
        unmanaged: 
          label: Unmanaged network (manual configuration)
          description: Bring your own AWS Instrastructure. Select an existing VPC and Subnets. By default, CAPA will still create Security Groups and a Control Plane Load Balancer.
      vpc:
        label: VPC
        cidrBlock: 
          label: VPC CIDR Block
          description: Configure a CIDR block for the CAPA-created VPC, divided between subnets.
          placeholder: 10.0.0.0/16
      subnets:
        label: Subnet
        placeholder: Select one or more subnets
      securityGroups:
        label: Security Group Overrides
        description: Select existing security groups instead of using the CAPA controller to automatically create new ones. Only applies when using an unmanaged network.
        selectVpc: Select a VPC first
        roles:
          bastion: Bastion SSH
          node: Workload nodes
          controlplane: Control plane nodes
          apiserver-lb: Kubernetes API server load balancer
          lb: Load balancer
        role: Role
        securityGroupId: Security Group ID
        addOverride: Add SG override
      additionalControlPlaneIngressRules:
        description: Set ingress rules for the control plane. Only CIDR blocks or Security Groups may be set, not both.
        label: Additional Control Plane Ingress Rules
      additionalNodeIngressRules:
        description: Set ingress rules for the control plane. Only CIDR blocks or Security Groups may be set, not both.
        label: Additional Node Ingress Rules
      cniIngressRules:
        description: CNI rules apply to both node and control plane security groups. The source for each rule will be set to the node and control plane security groups.
        label: CNI Ingress Rules
    sshKeyName:
      label: SSH Key Name
      noneLabel: None
      description: A default SSH key to attach to instances.
   
  machineConfig:
    instanceConfiguration:
      title: Instance configuration
      description: Configuration options for the EC2 instance.
      instanceType:
        label: Instance type
      subnet:
        label: Subnet
      advanced:
        title: Advanced instance settings
        machineImage:
          label: Machine image (AMI ID)
          placeholder: 'Default: A recent Ubuntu LTS'
        iamInstanceProfileName:
          label: IAM Instance Profile Name
        instanceMetadataOptions:
          httpTokens:
            label: Instance metadata HTTP Tokens
            description: The state of token usage for your instance metadata requests.
            options:
              required: Required
              optional: Optional
    storage:
      title: Storage
      description: Configuration options for the root storage volume.
      rootVolume:
        encrypted:
          label: Encrypted volume
        encryptionKey:
          label: Encryption key
          placeholder: KMS key id or ARN to encrypt the volume
        iops:
          label: IOPS
        size:
          label: Root Disk Size
        type:
          label: Volume type  
      advanced:
        title: Additional volumes (non-root)
        additionalVolumes:
          add: Add volume
          deviceName:
            label: Device name
          type:
            label: Volume type
          size:
            label: Disk size
    advanced:
      title: Advanced machine settings
      cloudInit:
        title: Cloud Init
        disable:
          label: Skip secrets manager (insecure)
      securityGroup:
        label: Security group
        options:
          standard: "Standard: Automatically create and use a 'rancher-nodes' security group"
          existing: Choose one or more existing security groups
      marketType:
        title: Market type
        description: This specifies the type of market for the EC2 instance and the max price if applies.
        options:
          onDemand: On Demand
          spot: Spot
          block: Capacity Block
        price:
          label: Max price
          placeholder: 'Default: 0.50'
          description: Defines the maximum price the user is willing to pay for Spot VM instances.
      tags:
        title: Additional tags
        description: Tags that CAPA will add to managed AWS resources, in addition to the usual ones it adds.
        add: Add tag